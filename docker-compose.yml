services:
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - REACT_APP_DOMAIN=${REACT_APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/certs/wildcard_fullchain.pem:/etc/ssl/certs/wildcard_fullchain.pem:ro
      - /etc/ssl/private/wildcard.key:/etc/ssl/private/wildcard.key:ro
    depends_on:
      - frontend
      - api
      - app1
      - backlog
      - blog
      - python
    networks:
      - otterverse-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - "UID=${UID:-1000}"
        - "GID=${GID:-1000}"
    command: sh -c "yarn install && yarn start"
    user: "${UID}:${GID}"
    restart: "no"
    env_file:
      - ".env"
    volumes:
      - ./frontend:/app
    networks:
      - otterverse-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        - "UID=${UID:-1000}"
        - "GID=${GID:-1000}"
    command: ["rails", "server", "--binding=0.0.0.0"]
    user: "${UID}:${GID}"
    restart: "no"
    env_file:
      - ".env"
    environment:
      - HOME=/app
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3000"
    volumes:
      - ./api:/app
    networks:
      - otterverse-net

  app1:
    image: nginx:alpine
    volumes:
      - ../app1:/usr/share/nginx/html:ro
    networks:
      - otterverse-net

  backlog:
    image: nginx:alpine
    volumes:
      - ../backlog:/usr/share/nginx/html:ro
    networks:
      - otterverse-net

  blog:
    image: nginx:alpine
    volumes:
      - ../blog:/usr/share/nginx/html:ro
    networks:
      - otterverse-net

  portfolio:
    image: nginx:alpine
    volumes:
      - ../inception:/usr/share/nginx/html:ro
    networks:
      - otterverse-net

  python:
    image: nginx:alpine
    volumes:
      - ../python:/usr/share/nginx/html:ro
    networks:
      - otterverse-net

  asep2025:
    build:
      context: ../asep2025Quiz
      dockerfile: Dockerfile
    networks:
      - otterverse-net

  postgres:
    image: postgres:12.11-alpine
    env_file:
      - ".env"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      retries: 3
      timeout: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - otterverse-net

  redis:
    image: redis:7.0-alpine
    env_file:
      - ".env"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s
    volumes:
      - redis-data:/data:rw
    networks:
      - otterverse-net

volumes:
  postgres-data:
  redis-data:
  plausible-postgres-data:
  plausible-clickhouse-data:
  plausible-data:

networks:
  otterverse-net:
    external: true
