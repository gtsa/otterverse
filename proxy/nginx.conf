worker_processes auto;
worker_rlimit_nofile 2048;

events {
  worker_connections 1024;
}

error_log /dev/stdout info;

http {
  charset                utf-8;

  sendfile               on;
  tcp_nopush             on;
  tcp_nodelay            on;

  server_tokens          off;

  types_hash_max_size    2048;
  types_hash_bucket_size 64;

  client_max_body_size   64M;

  include /etc/nginx/mime.types;
  default_type           application/octet-stream;

  # Main Frontend Service
  server {
      listen 80;
      server_name ${REACT_APP_DOMAIN};

      location / {
        proxy_pass http://frontend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
      }

      # Websocket for automatic reloading
      location /ws {
        proxy_pass http://frontend:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
      }

      location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
      }
  }

  # Subdomain for App1
  server {
      listen 80;
      server_name app1.${REACT_APP_DOMAIN};

      location / {
        proxy_pass http://app1:80/;
        proxy_set_header Host $host;
      }
  }

  # Subdomain for Backlog
  server {
      listen 80;
      server_name backlog.${REACT_APP_DOMAIN};

      location / {
        proxy_pass http://backlog:80/;
        proxy_set_header Host $host;
      }
  }

  # Subdomain for Blog
  server {
      listen 80;
      server_name blog.${REACT_APP_DOMAIN};

      location / {
        proxy_pass http://blog:80/;
        proxy_set_header Host $host;
      }
  }

  # Subdomain for Portfolio
  server {
      listen 80;
      server_name geotsa.${REACT_APP_DOMAIN};

      location / {
        proxy_pass http://portfolio:80/;
        proxy_set_header Host $host;
      }
  }

  # Subdomain for Python Apps
  server {
      listen 80;
      server_name python.${REACT_APP_DOMAIN};

      location / {
        proxy_pass http://python:80/;
        proxy_set_header Host $host;
      }
  }

  server {
      listen 80;
      server_name chronoquest.${REACT_APP_DOMAIN};

      location / {
        proxy_pass http://chronoquest-frontend:4173/;
      }

      location /api/ {
        proxy_pass http://chronoquest-backend:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
      }
  }
}
